<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>登录 - AI 面试平台</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="login-page">

<div class="login-container">
    <div class="login-left">
        <div class="logo-box">AI</div>
        <h1>AI 面试刷题与简历优化平台</h1>
        <p>
            面向实习求职场景，提供面试题库、简历解析、AI 优化建议、Redis 缓存与数据看板。
        </p>

        <div class="feature-list">
            <div>✓ 面试题库管理</div>
            <div>✓ DOCX 简历上传解析</div>
            <div>✓ AI 模拟优化建议</div>
            <div>✓ Spring Security 权限控制</div>
        </div>
    </div>

    <div class="login-card simple">
        <h2>欢迎登录</h2>
        <p class="login-subtitle">请输入账号密码进入系统</p>

        <div class="alert error" th:if="${param.error}">
            用户名或密码错误
        </div>

        <div class="alert success" th:if="${param.logout}">
            已成功退出登录
        </div>

        <div class="alert success" th:if="${param.registered}">
            注册成功，请登录
        </div>

        <form th:action="@{/login}" method="post">
            <input type="hidden"
                   th:if="${_csrf != null}"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <div class="login-form-item">
                <label>用户名</label>
                <input type="text" name="username" placeholder="请输入用户名" autocomplete="username">
            </div>

            <div class="login-form-item">
                <label>密码</label>
                <input type="password" name="password" placeholder="请输入密码" autocomplete="current-password">
            </div>

            <button class="login-btn" type="submit">登录系统</button>
            <div class="account-tip center-tip">
                还没有账号？
                <a th:href="@{/register}">立即注册</a>
            </div>
        </form>

    </div>
</div>

</body>
</html>
