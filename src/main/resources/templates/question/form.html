<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>题目表单</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">
    <div class="card">
        <h3 class="card-title" th:text="${question.id == null ? '新增面试题' : '编辑面试题'}"></h3>
        <form th:action="@{/questions/save}" method="post" th:object="${question}">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{viewCount}">
            <div class="form-row">
                <label>题目分类</label>
                <select th:field="*{category}" required>
                    <option value="">请选择分类</option>
                    <option th:each="c : ${categories}" th:value="${c}" th:text="${c}"></option>
                </select>
            </div>
            <div class="form-row">
                <label>岗位方向</label>
                <select th:field="*{jobType}" required>
                    <option value="">请选择岗位</option>
                    <option th:each="j : ${jobTypes}" th:value="${j}" th:text="${j}"></option>
                </select>
            </div>
            <div class="form-row">
                <label>题目标题</label>
                <input th:field="*{title}" placeholder="请输入面试题" required>
            </div>
            <div class="form-row">
                <label>参考答案</label>
                <textarea th:field="*{answer}" rows="8" placeholder="请输入参考答案和解析" required></textarea>
            </div>
            <div class="form-row">
                <label>难度</label>
                <select th:field="*{difficulty}" required>
                    <option th:each="d : ${difficulties}" th:value="${d}" th:text="${d}"></option>
                </select>
            </div>
            <div class="form-row">
                <label>标签</label>
                <input th:field="*{tags}" placeholder="如：Java,集合,HashMap">
            </div>
            <button class="btn" type="submit">保存</button>
            <a class="btn gray" th:href="@{/questions}">返回</a>
        </form>
    </div>
</div>
</body>
</html>
