<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>用户管理</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">
    <div class="card">
        <h3 class="card-title">用户管理</h3>
        <form class="toolbar" th:action="@{/users}" method="get">
            <input style="max-width:260px;" name="keyword" th:value="${keyword}" placeholder="用户名/昵称">
            <button class="btn" type="submit">查询</button>
            <a class="btn gray" th:href="@{/users}">重置</a>
            <a class="btn green" th:href="@{/users/form}">新增用户</a>
        </form>
        <table>
            <thead><tr><th>ID</th><th>用户名</th><th>昵称</th><th>角色</th><th>状态</th><th>创建时间</th><th>操作</th></tr></thead>
            <tbody>
            <tr th:each="u : ${page.records}">
                <td th:text="${u.id}"></td>
                <td th:text="${u.username}"></td>
                <td th:text="${u.nickname}"></td>
                <td><span class="badge" th:text="${u.role}"></span></td>
                <td th:text="${u.enabled == 1 ? '启用' : '禁用'}"></td>
                <td th:text="${u.createTime}"></td>
                <td>
                    <a class="btn small" th:href="@{/users/form(id=${u.id})}">编辑</a>
                    <a class="btn small danger" th:href="@{/users/delete/{id}(id=${u.id})}" onclick="return confirm('确认删除？')">删除</a>
                </td>
            </tr>
            </tbody>
        </table>
        <div class="pagination">
            <a class="btn small gray" th:if="${page.current > 1}" th:href="@{/users(page=${page.current-1},keyword=${keyword})}">上一页</a>
            <span>第 <b th:text="${page.current}"></b> / <b th:text="${page.pages}"></b> 页，共 <b th:text="${page.total}"></b> 条</span>
            <a class="btn small gray" th:if="${page.current < page.pages}" th:href="@{/users(page=${page.current+1},keyword=${keyword})}">下一页</a>
        </div>
    </div>
</div>
</body>
</html>
